<div class="shell">
  <header class="shell-header">
    <div class="brand">
      <span class="brand-mark">DT</span>
      <div>
        <p class="brand-title">Diet Tracking</p>
        <p class="brand-subtitle">{{ currentUser()?.email }}</p>
      </div>
    </div>
    <button type="button" class="logout-btn" (click)="logout()">Cerrar sesión</button>
  </header>

  <nav class="desktop-nav">
    <a routerLink="/app/perfil" routerLinkActive="active-link">Mi perfil</a>
    <a routerLink="/app/registro-comida" routerLinkActive="active-link">Registro de comida</a>
  </nav>

  <main class="shell-content">
    <router-outlet />
  </main>

  <nav class="mobile-nav">
    <a routerLink="/app/perfil" routerLinkActive="active-link">Perfil</a>
    <a routerLink="/app/registro-comida" routerLinkActive="active-link">Registrar</a>
  </nav>
</div>
