<section class="auth-card">
  <p class="eyebrow">NUEVA CUENTA</p>
  <h1>Regístrate</h1>
  <p class="subtitle">Crea tu usuario para empezar con tu histórico de comidas.</p>

  @if (errorMessage) {
    <p class="feedback error">{{ errorMessage }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label>
      Correo
      <input type="email" formControlName="email" placeholder="correo@dominio.com" />
    </label>

    <label>
      Contraseña
      <input type="password" formControlName="password" placeholder="Mínimo 6 caracteres" />
    </label>

    <label>
      Confirmar contraseña
      <input type="password" formControlName="confirmPassword" placeholder="Repite tu contraseña" />
    </label>

    <button class="primary-btn" type="submit">Crear cuenta</button>
  </form>

  @if (generatedCode && registeredEmail) {
    <div class="feedback success">
      <p>Cuenta creada. Código de confirmación simulado: <strong>{{ generatedCode }}</strong></p>
      <button type="button" (click)="goToConfirmation()">Ir a confirmar correo</button>
    </div>
  }

  <p class="cta">
    ¿Ya tienes cuenta?
    <a routerLink="/login">Iniciar sesión</a>
  </p>
</section>
