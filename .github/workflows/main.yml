name: Deploy Angular App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy
        run: |
          /opt/devops-scripts/Angular/deploy-angular.sh \
          diet-tracking \
          https://github.com/${{ github.repository }}.git
